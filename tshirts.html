<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirts | Vintage Valley Vantage</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        
        header { 
            background: #fff; padding: 20px; display: flex; justify-content: center; 
            align-items: center; border-bottom: 2px solid #eee; 
        }
        header img { height: 100px; width: auto; display: block; }
        
        nav { display: flex; justify-content: center; background: #333; padding: 10px 0; flex-wrap: wrap; }
        nav a { color: white; padding: 10px 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { background: #555; }

        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .price { font-weight: bold; color: #b12704; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="https://raw.githubusercontent.com/LoB31/vintagevalleyvantage.github.io/main/images/Vintage%20Valley%20Vantage%20V4%20-%20Final.png" 
                 alt="Vintage Valley Vantage Logo">
        </a>
    </header>

    <nav>
        <a href="tshirts.html">T-Shirts</a>
        <a href="pants.html">Pants</a>
        <a href="jackets.html">Jackets</a>
        <a href="shoes.html">Shoes</a>
        <a href="handbags.html">Handbags</a>
        <a href="accessories.html">Accessories</a>
    </nav>

    <div class="container">
        <h2>T-Shirts</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Vintage Wash Tee</h3>
                <p class="price">$25.00</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Heavyweight Cotton</h3>
                <p class="price">$30.00</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>90s Graphic Print</h3>
                <p class="price">$35.00</p>
            </div>
        </div>
    </div>

</body>
</html>
