<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessories | Vintage Valley Vantage</title>
    
    <!-- Snipcart CSS -->
    <link rel="preconnect" href="https://app.snipcart.com" />
    <link rel="preconnect" href="https://cdn.snipcart.com" />
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.css" />

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        header { background: #fff; padding: 20px; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #eee; }
        header img { height: 100px; width: auto; display: block; }
        
        /* Navigation Styling */
        nav { display: flex; justify-content: center; background: #333; padding: 10px 0; flex-wrap: wrap; align-items: center; }
        nav a { color: white; padding: 10px 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { background: #555; }
        
        /* Cart Button Styling */
        .snipcart-checkout {
            background: #ffcc00;
            color: #333 !important;
            border-radius: 20px;
            margin-left: 20px;
            padding: 8px 15px !important;
        }
        .snipcart-checkout:hover { background: #e6b800 !important; }

        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .price { font-weight: bold; color: #b12704; margin-top: 10px; }
        
        /* Snipcart Buy Button Styling */
        .snipcart-add-item { background: #b12704; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .snipcart-add-item:hover { background: #8e2003; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="https://raw.githubusercontent.com/LoB31/vintagevalleyvantage.github.io/main/images/Vintage%20Valley%20Vantage%20V4%20-%20Final.png" alt="Logo">
        </a>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="tshirts.html">T-Shirts</a>
        <a href="pants.html">Pants</a>
        <a href="jackets.html">Jackets</a>
        <a href="shoes.html">Shoes</a>
        <a href="handbags.html">Handbags</a>
        <a href="accessories.html">Accessories</a>
        <a href="contact.html">Contact</a>
        <a href="#" class="snipcart-checkout">
            View Cart (<span class="snipcart-items-count">0</span>)
        </a>
    </nav>

    <div class="container">
        <h2>Accessories</h2>
        <div class="product-grid">
            
            <!-- Accessory 1 -->
            <div class="product-card">
                <img src="https://github.com/LoB31/vintagevalleyvantage.github.io/blob/main/images/Leather%20Belt.jpg" alt="Product">
                <h3>Leather Belt</h3>
                <p class="price">$35.00</p>
                <button class="snipcart-add-item"
                  data-item-id="acc-001"
                  data-item-name="Leather Belt"
                  data-item-price="35.00"
                  data-item-url="https://lob31.github.io/vintagevalleyvantage.github.io/accessories.html"
                  data-item-description="Classic genuine leather belt."
                  data-item-image="https://github.com/LoB31/vintagevalleyvantage.github.io/blob/main/images/Leather%20Belt.jpg">
                  Add to Cart
                </button>
            </div>

            <!-- Accessory 2 -->
            <div class="product-card">
                <img src="https://github.com/LoB31/vintagevalleyvantage.github.io/blob/main/images/Vintage%20Sunglasses.jpg" alt="Product">
                <h3>Vintage Sunglasses</h3>
                <p class="price">$25.00</p>
                <button class="snipcart-add-item"
                  data-item-id="acc-002"
                  data-item-name="Vintage Sunglasses"
                  data-item-price="25.00"
                  data-item-url="https://lob31.github.io/vintagevalleyvantage.github.io/accessories.html"
                  data-item-description="Retro-style vintage sunglasses."
                  data-item-image="https://github.com/LoB31/vintagevalleyvantage.github.io/blob/main/images/Vintage%20Sunglasses.jpg">
                  Add to Cart
                </button>
            </div>

        </div>
    </div>

    <!-- Snipcart Script -->
    <div id="snipcart" data-api-key="NzhhNDA2NDctNTA3NC00MmRmLWE0YWUtZmRlMzRmMGZlNGFiNjM5MTc4NzQ1Njk5Nzc2MTY0" hidden></div>
    <script src="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.js"></script>

</body>
</html>
